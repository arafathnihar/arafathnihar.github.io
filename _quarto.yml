project:
  type: website
  output-dir: docs
  resources:
    - CNAME
    - arafath-nihar.vcf
    - digital-card.js
  render:
    - index.qmd

website:
  title: "Arafath Nihar"
  description: "Platform, data infrastructure, machine learning, and research engineering"
  site-url: "https://arafathnihar.com/"
  site-path: "/"
  repo-url: "https://github.com/arafathnihar/arafathnihar.github.io"
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    left:
      - text: Home
        href: index.qmd
      - text: Card
        href: index.qmd#digital-card
      - text: Experience
        href: index.qmd#experience
      - text: Projects
        href: index.qmd#projects
      - text: Publications
        href: index.qmd#publications
      - text: Education
        href: index.qmd#education
    right:
      - icon: github
        href: https://github.com/arafathnihar
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/arafathnihar/
        aria-label: LinkedIn
      - icon: envelope
        href: mailto:arafathnihar@gmail.com
        aria-label: Email
  page-footer:
    left: "© 2026 Arafath Nihar"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    include-in-header:
      - file: seo.html
    theme:
      - cosmo
      - styles.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    link-external-newwindow: true
    code-copy: true

execute:
  freeze: auto
